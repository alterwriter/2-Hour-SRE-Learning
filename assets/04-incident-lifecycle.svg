<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="620" viewBox="0 0 1060 620">
<style>
    .title { font: 700 24px "DejaVu Sans", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 600 15px "DejaVu Sans", Arial, sans-serif; fill: #1e293b; }
    .label { font: 600 14px "DejaVu Sans", Arial, sans-serif; fill: #0f172a; }
    .small { font: 400 12px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
    .tiny { font: 400 11px "DejaVu Sans", Arial, sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 14; ry: 14; }
    .box2 { fill: #eef6ff; stroke: #60a5fa; stroke-width: 1.5; rx: 14; ry: 14; }
    .box3 { fill: #f0fdf4; stroke: #4ade80; stroke-width: 1.5; rx: 14; ry: 14; }
    .box4 { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 14; ry: 14; }
    .box5 { fill: #fdf2f8; stroke: #f472b6; stroke-width: 1.5; rx: 14; ry: 14; }
    .line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow2); stroke-dasharray: 6 6; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
  </marker>
</defs>

<rect x="30" y="28" width="1000" height="564" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
<text x="55" y="68" class="title">Incident Lifecycle</text>
<text x="55" y="95" class="small">Urutan yang harus dipahami peserta saat melakukan audit kesiapan insiden.</text>

<rect class="box2" x="70" y="180" width="140" height="90"/>
<text x="106" y="212" class="subtitle">Detection</text>
<text x="94" y="235" class="small">alert, user report</text>

<rect class="box3" x="240" y="180" width="140" height="90"/>
<text x="286" y="212" class="subtitle">Triage</text>
<text x="258" y="235" class="small">severity, scope, owner</text>

<rect class="box4" x="410" y="180" width="140" height="90"/>
<text x="438" y="212" class="subtitle">Mitigation</text>
<text x="430" y="235" class="small">rollback, failover</text>

<rect class="box5" x="580" y="180" width="160" height="90"/>
<text x="602" y="212" class="subtitle">Communication</text>
<text x="615" y="235" class="small">status page, ETA</text>

<rect class="box" x="770" y="180" width="140" height="90"/>
<text x="809" y="212" class="subtitle">Recovery</text>
<text x="792" y="235" class="small">service restored</text>

<rect class="box2" x="415" y="355" width="220" height="100"/>
<text x="466" y="388" class="subtitle">Postmortem</text>
<text x="441" y="413" class="small">fakta, akar masalah, tindakan</text>
<text x="480" y="432" class="small">pencegahan</text>

<path class="line" d="M210 225 H240"/>
<path class="line" d="M380 225 H410"/>
<path class="line" d="M550 225 H580"/>
<path class="line" d="M740 225 H770"/>
<path class="line" d="M840 270 V320 H635"/>
<path class="line" d="M525 320 V355"/>

<rect x="80" y="490" width="850" height="56" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="108" y="524" class="small">Audit yang baik memeriksa kesiapan di setiap fase: deteksi, pengambilan keputusan, mitigasi, komunikasi, dan pembelajaran.</text>

</svg>